        use case, and has no generalization relationships. Formatting reply text is
        an internal implementation step of posting a reply, not a standalone service
        providing an observable result to any user. This is functional decomposition
        of "Post Reply."'
    - constructs_involved: Search Forum, Build Search Index, include relationship
        from Search Forum to Build Search Index
      explanation: '"Build Search Index" is an inclusion use case included only by
