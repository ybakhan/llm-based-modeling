      explanation: '"Validate Route Availability" is an inclusion use case included
        only by "Plan Journey". It is not associated with any actor, is not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. It represents a
        decomposed sub-step (checking if a route exists) rather than a complete, independently
        valuable service observable to a user. This is functional decomposition of
        "Plan Journey" into an artificially separated fragment.'
    - constructs_involved: Purchase Ticket, Calculate Fare, include (Purchase Ticket
        → Calculate Fare)
      explanation: '"Calculate Fare" is an inclusion use case included only by "Purchase
        Ticket". It is not associated with any actor, is not included by any other
        use case, does not include or extend any use case, is not extended by any
        use case, and has no generalization relationships. Fare calculation is a sub-step
        of purchasing a ticket and does not represent a standalone service with an
        observable result for any actor. This is functional decomposition of "Purchase
        Ticket" into an internal processing fragment.'
    - constructs_involved: Register Account, Send Confirmation Email, include (Register
        Account → Send Confirmation Email)
      explanation: '"Send Confirmation Email" is an inclusion use case included only
        by "Register Account". It is not associated with any actor, is not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Sending a confirmation
        email is an internal implementation step of registration, not a complete service
        yielding an independent observable result to a user. This is functional decomposition
        of "Register Account" into a technical sub-task.'
