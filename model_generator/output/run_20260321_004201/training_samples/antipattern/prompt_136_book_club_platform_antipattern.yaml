      explanation: '"Select Date and Time" (UC5) is an inclusion use case that is
        included by only one use case ("Schedule Meeting", UC4). UC5 is not associated
        with any actor directly — no actor interacts with it. UC5 does not include,
        extend, generalize, or get extended by any other use case. It represents a
        sub-step of scheduling a meeting (selecting a date/time) rather than a complete,
        independently valuable service observable to a user. This is classic functional
        decomposition: the behavior of "Schedule Meeting" has been artificially broken
        into a procedural sub-step via an include relationship, when "Select Date
        and Time" has no standalone value and is not reused elsewhere.'
