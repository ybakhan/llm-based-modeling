      explanation: The use case "Validate Equipment ID" is an inclusion use case that
        is included by only one use case ("Submit Work Order"). It is not associated
        with any actor directly, it does not include or extend any other use case,
        it is not extended by any other use case, and it is not involved in any generalization.
        "Validate Equipment ID" represents a sub-step of submitting a work order —
        validating the equipment identifier — rather than a complete, standalone service
        that delivers an observable result to any user. This is a textbook instance
        of functional decomposition via the include relationship, where a single use
        case's internal logic has been improperly broken out into a separate inclusion
        use case.
