      explanation: '"Validate Insurance Details" is an inclusion use case included
        only by "Book Appointment." It is not associated with any actor, is not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. It represents a
        sub-step (insurance validation) of the booking process rather than a complete,
        independently valuable service observable to any actor. This is functional
        decomposition — breaking "Book Appointment" into procedural steps via include.'
    - constructs_involved: Book Appointment, Select Time Slot, include (Book Appointment
        → Select Time Slot)
      explanation: '"Select Time Slot" is an inclusion use case included only by "Book
        Appointment." It has no direct association with any actor, is not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Selecting a time
        slot is a sub-step of booking, not a standalone service delivering an observable
        result to a user. This is functional decomposition of the booking workflow.'
    - constructs_involved: Cancel Appointment, Send Cancellation Notification, include
        (Cancel Appointment → Send Cancellation Notification)
      explanation: '"Send Cancellation Notification" is an inclusion use case included
        only by "Cancel Appointment." It is not associated with any actor, is not
        included by any other use case, does not include or extend any use case, is
        not extended by any use case, and has no generalization relationships. Sending
        a notification is an internal procedural step of cancellation, not a complete
        service with an observable result to an actor. This is functional decomposition
        of the cancellation process.'
