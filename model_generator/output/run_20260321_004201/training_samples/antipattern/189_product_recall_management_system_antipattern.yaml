  - name: 'Functional Decomposition: Using the include relationship'
    instances:
    - constructs_involved: Initiate Recall, Validate Product Batch, include relationship
        from "Initiate Recall" to "Validate Product Batch"
      explanation: '"Validate Product Batch" is an inclusion use case that is included
        only by "Initiate Recall." It is not associated with any actor, not included
        by any other use case, and does not include, extend, generalize, or get extended
        by any other use case. It represents a sub-step (validating a batch) rather
        than a complete service observable to an actor. This is functional decomposition
        — the behavior of validating a product batch should be part of the "Initiate
        Recall" use case itself.'
    - constructs_involved: Notify Stakeholders, Compose Notification Message, include
        relationship from "Notify Stakeholders" to "Compose Notification Message"
      explanation: '"Compose Notification Message" is included only by "Notify Stakeholders."
        It has no actor association, is not included by any other use case, and does
        not include, extend, generalize, or get extended by any other construct. Composing
        a notification message is a procedural sub-step of notifying stakeholders,
        not a standalone service providing an observable result to any user. This
        is a clear functional decomposition of the notification process.'
    - constructs_involved: Generate Recall Report, Aggregate Recall Data, include
        relationship from "Generate Recall Report" to "Aggregate Recall Data"
      explanation: '"Aggregate Recall Data" is included only by "Generate Recall Report."
        It is not associated with any actor, is not included by any other use case,
        and does not include, extend, generalize, or get extended by any other use
        case. Aggregating data is an internal processing step of report generation,
        not a complete service yielding an observable result to an actor. This constitutes
        functional decomposition of the reporting process.'
