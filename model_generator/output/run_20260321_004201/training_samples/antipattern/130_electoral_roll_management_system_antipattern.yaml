        standalone service observable by an actor. This is functional decomposition
        — breaking "Register Voter" into procedural steps via <<include>>.'
    - constructs_involved: Update Voter Record, Verify Address Change
      explanation: '"Verify Address Change" is an inclusion use case included only
        by "Update Voter Record". It is not associated with any actor, is not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Verifying an address
        change is an internal step of updating a voter record, not a complete service
        to any actor. This constitutes functional decomposition of the update process.'
    - constructs_involved: Remove Voter, Confirm Removal Eligibility
      explanation: '"Confirm Removal Eligibility" is an inclusion use case included
