  - name: 'Functional Decomposition: Using the include relationship'
    instances:
    - constructs_involved: Conduct Review Meeting, Load Employee History
      explanation: '"Load Employee History" is an inclusion use case included only
        by "Conduct Review Meeting". It is not associated with any actor, not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Loading employee
        history is a substep of conducting a review meeting and does not provide a
        complete, observable service to any actor on its own. This is functional decomposition
        — breaking the "Conduct Review Meeting" service into an artificial sub-function.'
    - constructs_involved: Set Performance Goals, Validate Goal Criteria
      explanation: '"Validate Goal Criteria" is an inclusion use case included only
        by "Set Performance Goals". It is not associated with any actor, not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Validating goal
        criteria is merely an internal step of setting performance goals and does
        not represent a complete service observable by any user. This constitutes
        functional decomposition of the goal-setting process.'
    - constructs_involved: Submit Self-Assessment, Calculate Self-Score
      explanation: '"Calculate Self-Score" is an inclusion use case included only
        by "Submit Self-Assessment". It is not associated with any actor, not included
        by any other use case, does not include or extend any use case, is not extended
        by any use case, and has no generalization relationships. Calculating a self-score
        is an internal computation substep of submitting a self-assessment and does
        not deliver a standalone, observable result to any actor. This is functional
        decomposition of the self-assessment submission.'
