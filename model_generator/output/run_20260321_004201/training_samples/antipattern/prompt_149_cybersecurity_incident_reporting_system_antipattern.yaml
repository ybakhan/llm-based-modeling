      explanation: '"Validate Incident Fields" is an inclusion use case included only
        by "Report Incident." It is not associated with any actor, does not include
        or extend any other use case, is not extended by any use case, and is not
        part of any generalization. It represents a sub-step (field validation) of
        reporting an incident rather than a complete, independently valuable service
        observable to an actor. This is functional decomposition of "Report Incident"
        into an internal processing step.'
    - constructs_involved: Escalate Incident, Notify Escalation Team, include (Escalate
        Incident → Notify Escalation Team)
      explanation: '"Notify Escalation Team" is an inclusion use case included only
        by "Escalate Incident." It has no direct actor association, does not include
        or extend any other use case, is not extended by any use case, and is not
        a generalization or specialization. Sending a notification to the escalation
        team is an internal sub-step of the escalation process, not a standalone service
        providing an observable result to a user. This decomposes "Escalate Incident"
        functionally.'
    - constructs_involved: Generate Compliance Report, Aggregate Incident Data, include
        (Generate Compliance Report → Aggregate Incident Data)
      explanation: '"Aggregate Incident Data" is included only by "Generate Compliance
        Report." It is not associated with any actor, does not include or extend any
        other use case, is not extended by any use case, and has no generalization
        relationships. Aggregating data is an internal computational step within report
        generation, not a complete service with an observable result for any actor.
        This is functional decomposition of "Generate Compliance Report."'
